<!--
  Reasoning Across Borders — personal website project card

  Paste this whole block into the Projects section. The card works without
  JavaScript. The short script at the bottom only hydrates aggregate counters;
  remove it if the site builder blocks scripts.

  Live iframe alternative:
  <iframe
    src="https://reasoning-across-borders.mumerzafer.workers.dev/embed"
    title="Reasoning Across Borders project"
    loading="lazy"
    style="width:100%;max-width:440px;height:230px;border:0"
  ></iframe>
-->
<style>
  .rab-project-card {
    --rab-ink: #152238;
    --rab-paper: #fbfaf4;
    --rab-blue: #6f7edb;
    --rab-mint: #dcefe3;
    --rab-coral: #f3a38f;
    position: relative;
    overflow: hidden;
    max-width: 680px;
    padding: clamp(22px, 5vw, 36px);
    border: 1.5px solid var(--rab-ink);
    border-radius: 20px;
    background: var(--rab-paper);
    color: var(--rab-ink);
    box-shadow: 7px 8px 0 rgba(21, 34, 56, 0.14);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .rab-project-card::after {
    content: "";
    position: absolute;
    width: 150px;
    height: 150px;
    right: -65px;
    top: -75px;
    border: 26px solid var(--rab-mint);
    border-radius: 50%;
  }
  .rab-project-card > * { position: relative; z-index: 1; }
  .rab-kicker { color: #4b5bb7; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.11em; text-transform: uppercase; }
  .rab-project-card h3 { max-width: 560px; margin: 10px 0 12px; font: 500 clamp(1.8rem, 5vw, 3rem)/1.02 Georgia, serif; }
  .rab-project-card p { max-width: 570px; margin: 0; color: #465269; line-height: 1.55; }
  .rab-stack { margin-top: 15px !important; color: #697389 !important; font-size: 0.82rem; }
  .rab-stats { display: flex; flex-wrap: wrap; gap: 8px; margin: 22px 0; }
  .rab-stats span { min-width: 92px; padding: 9px 12px; border: 1px solid var(--rab-ink); border-radius: 9px; background: white; font-size: 0.76rem; }
  .rab-stats b { display: block; font: 500 1.35rem/1 Georgia, serif; }
  .rab-links { display: flex; flex-wrap: wrap; gap: 10px; }
  .rab-links a { padding: 10px 16px; border: 1px solid var(--rab-ink); border-radius: 999px; color: var(--rab-ink); font-size: 0.82rem; font-weight: 800; text-decoration: none; }
  .rab-links a:first-child { background: var(--rab-coral); }
  .rab-links a:last-child { background: white; }
</style>

<article class="rab-project-card" aria-labelledby="rab-project-title">
  <span class="rab-kicker">Public-interest AI evaluation</span>
  <h3 id="rab-project-title">Reasoning Across Borders</h3>
  <p>A public benchmark testing whether the same consumer AI product reasons differently depending on where its user is located.</p>
  <p class="rab-stack">Next.js · Cloudflare Workers · D1 · Deterministic scoring</p>
  <div class="rab-stats" aria-label="Live project statistics">
    <span><b data-rab-stat="submissions">—</b>runs</span>
    <span><b data-rab-stat="cities">—</b>cities</span>
    <span><b data-rab-stat="models">—</b>models</span>
  </div>
  <nav class="rab-links" aria-label="Reasoning Across Borders links">
    <a href="https://reasoning-across-borders.mumerzafer.workers.dev/">Contribute →</a>
    <a href="https://github.com/Omarzaf/testing-ai-geolocation-hypothesis">View source</a>
  </nav>
</article>

<!-- Optional live-counter enhancement. The card above remains complete without it. -->
<script>
  fetch("https://reasoning-across-borders.mumerzafer.workers.dev/api/stats")
    .then(function (response) { if (!response.ok) throw new Error("stats"); return response.json(); })
    .then(function (stats) {
      ["submissions", "cities", "models"].forEach(function (key) {
        var node = document.querySelector('[data-rab-stat="' + key + '"]');
        if (node) node.textContent = Number(stats[key] || 0).toLocaleString();
      });
    })
    .catch(function () {});
</script>
